<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎌 Anime DB Pro</title>
    <style>
        :root{--bg:#0d0d1a;--sf:#13132b;--sf2:#1a1a35;--ac:#6c63ff;--ac2:#ff6584;--tx:#e8e8f0;--mu:#8888aa;--bd:#2a2a4a;--cd:#16162e;--rd:12px}
        *{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',Tahoma,sans-serif;min-height:100vh}
        nav{background:rgba(13,13,26,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:0 24px;height:64px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
        .logo{font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
        .nsw{flex:1;max-width:480px;position:relative}.nsw input{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:50px;padding:9px 18px 9px 42px;color:var(--tx);font-size:.88rem;outline:none;transition:border-color .2s}.nsw input:focus{border-color:var(--ac)}
        .nsw .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--mu);pointer-events:none}
        .nst{margin-right:auto;font-size:.8rem;color:var(--mu)}
        .ctrl{padding:14px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--bd);background:var(--sf);position:sticky;top:64px;z-index:99}
        select,.btn{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:7px 13px;border-radius:8px;font-size:.83rem;cursor:pointer;outline:none;transition:all .2s}
        .btn.on{background:var(--ac);color:#fff}
        .tb{padding:9px 24px;display:flex;gap:7px;overflow-x:auto;border-bottom:1px solid var(--bd);background:var(--sf);scrollbar-width:none}
        .chip{background:var(--sf2);border:1px solid var(--bd);color:var(--mu);padding:4px 13px;border-radius:50px;font-size:.76rem;cursor:pointer;white-space:nowrap}.chip.on{background:var(--ac);color:#fff}
        #ac{padding:20px 24px}
        .gv{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:18px}
        .lv{display:flex;flex-direction:column;gap:10px}
        .card{background:var(--cd);border:1px solid var(--bd);border-radius:var(--rd);overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
        .card:hover{transform:translateY(-4px);border-color:var(--ac)}
        .iw{position:relative;padding-top:142%;overflow:hidden;background:var(--sf2)}
        .iw img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
        .cb{padding:10px}.ct{font-size:.85rem;font-weight:600;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .sc{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);padding:3px 8px;border-radius:6px;font-size:.75rem;color:#fcd34d;font-weight:700}
        
        /* Modal Styles */
        .mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);z-index:1000;align-items:center;justify-content:center;padding:20px}
        .mo.open{display:flex}
        .mbox{background:var(--sf);border:1px solid var(--bd);border-radius:20px;max-width:800px;width:100%;max-height:90vh;overflow-y:auto;position:relative}
        .mcb{position:absolute;top:15px;right:15px;background:var(--sf2);color:#fff;border:none;width:35px;height:35px;border-radius:50%;cursor:pointer;z-index:10}
        .mc{padding:25px}
        .mban{height:250px;position:relative;background:var(--sf2);overflow:hidden}.mban img{width:100%;height:100%;object-fit:cover}
        
        /* Character Section Styles */
        .char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-top:20px}
        .char-card{background:var(--sf2);border-radius:12px;overflow:hidden;border:1px solid var(--bd);text-align:center;padding-bottom:10px}
        .char-img{width:100%;height:150px;object-fit:cover}
        .char-name{font-size:.75rem;font-weight:bold;padding:5px;display:block}
        .char-role{font-size:.65rem;color:var(--mu);display:block}
        .char-btn{background:var(--ac);border:none;color:white;font-size:.6rem;padding:3px 8px;border-radius:4px;cursor:pointer;margin-top:5px}
        .char-bio{font-size:.8rem;color:var(--mu);background:var(--bg);padding:10px;border-radius:8px;margin-top:10px;white-space:pre-wrap;display:none}

        .pag{display:flex;justify-content:center;gap:8px;padding:30px}
        .pb{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:8px 15px;border-radius:8px;cursor:pointer}.pb.on{background:var(--ac);color:#fff}
    </style>
</head>
<body>
<nav>
  <div class="logo">🎌 Anime DB</div>
  <div class="nsw"><span class="si">🔍</span><input type="text" id="si" placeholder="ابحث باسم الأنمي..."></div>
  <div class="nst" id="nst"></div>
</nav>

<div id="app">
  <div class="ctrl">
    <select id="ss"><option value="yr-d">الأحدث</option><option value="yr-a">الأقدم</option><option value="sc-d">الأعلى تقييماً</option></select>
    <select id="stp"><option value="">كل الأنواع</option><option value="TV">TV</option><option value="MOVIE">Movie</option></select>
    <select id="syr"><option value="">كل السنوات</option></select>
    <button class="btn" id="bsc">⭐ المقيّم</button>
    <div class="cr"><span class="rc" id="rc"></span></div>
  </div>
  <div class="tb" id="tb"></div>
  <div id="ac"><div id="ag" class="gv"></div></div>
  <div class="pag" id="pg"></div>
</div>

<div class="mo" id="mo" onclick="if(event.target.id==='mo')closeModal()">
    <div class="mbox">
        <button class="mcb" onclick="closeModal()">✕</button>
        <div class="mban"><img id="mi" src=""><div style="position:absolute;inset:0;background:linear-gradient(to top,var(--sf),transparent)"></div></div>
        <div class="mc">
            <h2 id="mt" style="margin-bottom:15px"></h2>
            <div id="md" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px"></div>
            <button class="btn on" id="loadCharsBtn" style="width:100%;padding:12px">👥 عرض الشخصيات (من الإنترنت)</button>
            <div id="charContainer" class="char-grid"></div>
        </div>
    </div>
</div>

<script>
    const G = { ag: document.getElementById('ag'), rc: document.getElementById('rc'), pg: document.getElementById('pg'), nst: document.getElementById('nst') };
    let F = { q: '', type: '', year: '', has_score: false, tag: '', sort: 'yr-d', page: 1 };

    const fetchData = async () => {
        G.ag.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:50px">⏳ جار التحميل...</div>';
        const params = new URLSearchParams(F);
        const res = await fetch(`/api/anime?${params}`);
        const data = await res.json();
        renderAnime(data.data);
        renderPagination(data.page, data.total_pages);
        G.rc.textContent = `${data.total_items.toLocaleString()} أنمي`;
    };

    const renderAnime = (list) => {
        G.ag.innerHTML = '';
        list.forEach(a => {
            const card = document.createElement('div');
            card.className = 'card';
            const score = a.score?.arithmeticMean?.toFixed(1);
            card.innerHTML = `<div class="iw"><img src="${a.thumbnail || a.picture}" loading="lazy"></div>${score?`<div class="sc">⭐ ${score}</div>`:''}<div class="cb"><div class="ct">${a.title}</div><div style="font-size:.7rem;color:var(--mu)">${a.type} | ${a.animeSeason?.year || 'N/A'}</div></div>`;
            card.onclick = () => openModal(a);
            G.ag.appendChild(card);
        });
    };

    const openModal = (a) => {
        document.getElementById('mt').textContent = a.title;
        document.getElementById('mi').src = a.picture || '';
        document.getElementById('charContainer').innerHTML = '';
        document.getElementById('loadCharsBtn').onclick = () => loadCharacters(a);
        document.getElementById('mo').classList.add('open');
        document.body.style.overflow = 'hidden';
    };

    const loadCharacters = async (a) => {
        const btn = document.getElementById('loadCharsBtn');
        const container = document.getElementById('charContainer');
        const malId = a.sources.find(s => s.includes('myanimelist.net/anime/'))?.split('/').pop();
        
        if (!malId) { alert("رقم MAL غير متوفر لهذا الأنمي"); return; }
        
        btn.textContent = "⏳ جاري جلب الشخصيات...";
        btn.disabled = true;

        try {
            const res = await fetch(`/api/characters/${malId}`);
            const json = await res.json();
            const chars = json.data || [];
            
            container.innerHTML = '';
            chars.slice(0, 12).forEach(c => {
                const char = c.character;
                const div = document.createElement('div');
                div.className = 'char-card';
                div.innerHTML = `
                    <img class="char-img" src="${char.images.jpg.image_url}">
                    <span class="char-name">${char.name}</span>
                    <span class="char-role">${c.role}</span>
                    <button class="char-btn" onclick="showCharBio(${char.mal_id}, this)">تفاصيل</button>
                    <div class="char-bio" id="bio-${char.mal_id}"></div>
                `;
                container.appendChild(div);
            });
            btn.style.display = 'none';
        } catch (e) {
            btn.textContent = "❌ فشل التحميل، حاول لاحقاً";
            btn.disabled = false;
        }
    };

    const showCharBio = async (charId, btn) => {
        const bioDiv = document.getElementById(`bio-${charId}`);
        if (bioDiv.style.display === 'block') { bioDiv.style.display = 'none'; return; }
        
        btn.textContent = "⏳...";
        const res = await fetch(`/api/character-info/${charId}`);
        const json = await res.json();
        bioDiv.textContent = json.data.about || "لا توجد معلومات متوفرة.";
        bioDiv.style.display = 'block';
        btn.textContent = "إخفاء";
    };

    const renderPagination = (cur, tot) => {
        G.pg.innerHTML = ''; if (tot <= 1) return;
        const add = (l, p) => {
            const b = document.createElement('button'); b.className = 'pb' + (p === cur ? ' on' : ''); b.textContent = l;
            b.onclick = () => { if (p) { F.page = p; fetchData(); window.scrollTo(0, 0); } };
            G.pg.appendChild(b);
        };
        if (cur > 1) add('◀', cur - 1);
        add(cur, cur);
        if (cur < tot) add('▶', cur + 1);
    };

    const closeModal = () => { document.getElementById('mo').classList.remove('open'); document.body.style.overflow = ''; };
    
    // Initial Load
    (async () => {
        const metaRes = await fetch('/api/meta');
        const meta = await metaRes.json();
        const yrSel = document.getElementById('syr');
        meta.years.forEach(y => yrSel.innerHTML += `<option value="${y}">${y}</option>`);
        document.getElementById('si').oninput = (e) => { F.q = e.target.value; F.page = 1; fetchData(); };
        document.getElementById('stp').onchange = (e) => { F.type = e.target.value; F.page = 1; fetchData(); };
        document.getElementById('syr').onchange = (e) => { F.year = e.target.value; F.page = 1; fetchData(); };
        fetchData();
    })();
</script>
</body>
</html>
